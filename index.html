<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>觀盤</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root{
  --bg:#060709;
  --s1:#0c0e13;
  --s2:#10131a;
  --s3:#161b25;
  --bdr:#1c2130;
  --bdr2:#222840;
  --gold:#c8a84b;
  --gold2:#e2c97e;
  --goldG:linear-gradient(135deg,#c8a84b 0%,#e2c97e 50%,#c8a84b 100%);
  --goldGlow:#c8a84b;
  --up:#2ecc8f;
  --upBg:#2ecc8f0e;
  --dn:#e5566d;
  --dnBg:#e5566d0e;
  --txt:#e8edf8;
  --txt2:#8b96b4;
  --txt3:#4a5470;
  --mono:'DM Mono','SF Mono',monospace;
  --sans:'Noto Sans TC',-apple-system,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:var(--sans);
  min-height:100vh;
  padding-bottom:80px;
  /* Subtle noise texture via SVG */
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}
button{font-family:var(--sans);cursor:pointer;-webkit-appearance:none;}
input{font-family:var(--sans);-webkit-appearance:none;}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:var(--bdr2);}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:99;
  padding:0 20px;
  height:60px;
  display:flex;align-items:center;gap:14px;
  background:rgba(6,7,9,0.85);
  border-bottom:1px solid var(--bdr);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
}
.logo-wrap{display:flex;align-items:center;gap:12px;}
.logo{
  width:36px;height:36px;flex-shrink:0;
  background:var(--goldG);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:17px;color:#060709;
  position:relative;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  box-shadow:0 0 24px #c8a84b40;
}
.logo-text{
  display:flex;flex-direction:column;gap:1px;
}
.logo-name{
  font-size:17px;font-weight:900;letter-spacing:2px;
  background:var(--goldG);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.logo-sub{font-size:10px;color:var(--txt3);letter-spacing:3px;text-transform:uppercase;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.time-badge{
  font-family:var(--mono);font-size:11px;color:var(--txt3);
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:6px;padding:4px 8px;letter-spacing:.5px;
}

/* ── PAGE ── */
.page{max-width:840px;margin:0 auto;padding:20px 16px 0;}
.tab-page{display:none;animation:fadeIn .2s ease;}
.tab-page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── SECTION LABEL ── */
.sec-label{
  font-size:10px;font-weight:700;color:var(--txt3);
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bdr),transparent);}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px;}
@media(max-width:500px){.stat-grid{grid-template-columns:1fr 1fr;}}
.stat{
  background:var(--s2);
  border:1px solid var(--bdr);
  border-radius:14px;
  padding:16px 14px;
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.stat::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,#ffffff04 0%,transparent 60%);
  pointer-events:none;
}
.stat-label{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;}
.stat-num{font-family:var(--mono);font-size:20px;font-weight:500;line-height:1;}
.stat-sub{font-size:10px;color:var(--txt3);margin-top:5px;font-family:var(--mono);}
.stat.up-card{border-color:var(--up)18;background:linear-gradient(145deg,var(--upBg),var(--s2));}
.stat.dn-card{border-color:var(--dn)18;background:linear-gradient(145deg,var(--dnBg),var(--s2));}

/* ── INDEX ROW ── */
.idx-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;-webkit-overflow-scrolling:touch;}
.idx-scroll::-webkit-scrollbar{display:none;}
.idx-card{
  flex:1 1 130px;min-width:130px;
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:14px;padding:14px 16px;
  position:relative;overflow:hidden;
  transition:border-color .3s;
}
.idx-card.up{border-color:var(--up)25;}
.idx-card.dn{border-color:var(--dn)25;}
.idx-name{font-size:10px;color:var(--txt3);letter-spacing:1px;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.idx-price{font-family:var(--mono);font-size:19px;font-weight:500;margin-bottom:4px;}
.idx-chg{font-size:12px;font-weight:700;font-family:var(--mono);}
.idx-chart{height:40px;margin-top:10px;}

/* ── TABLE ── */
.tbl-wrap{background:var(--s2);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{min-width:480px;width:100%;border-collapse:collapse;}
thead tr{background:var(--s1);border-bottom:1px solid var(--bdr);}
th{
  padding:11px 16px;text-align:left;
  font-size:9px;font-weight:700;color:var(--txt3);
  letter-spacing:2px;text-transform:uppercase;white-space:nowrap;
}
td{padding:13px 16px;font-size:14px;border-bottom:1px solid var(--bdr);}
tbody tr:last-child td{border-bottom:none;}
tbody tr{cursor:pointer;transition:background .1s;}
tbody tr:active{background:var(--s3);}
.td-ticker{font-weight:700;font-size:14px;letter-spacing:.5px;}
.td-name{font-size:10px;color:var(--txt3);margin-top:2px;}
.td-mono{font-family:var(--mono);font-size:13px;}
.badge-up{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--upBg);color:var(--up);
  border-radius:6px;padding:3px 7px;
  font-family:var(--mono);font-size:12px;font-weight:500;
}
.badge-dn{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--dnBg);color:var(--dn);
  border-radius:6px;padding:3px 7px;
  font-family:var(--mono);font-size:12px;font-weight:500;
}

/* ── STOCK CARDS ── */
.stock-card{
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:18px;overflow:hidden;margin-bottom:12px;
  transition:border-color .2s;
}
.stock-card.open{border-color:var(--gold)30;}
.stock-hdr{
  padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;
  transition:background .1s;
}
.stock-hdr:active{background:var(--s3);}
.ticker-badge{
  width:46px;height:46px;flex-shrink:0;
  background:var(--s3);border:1px solid var(--bdr2);
  border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:11px;color:var(--gold);
  letter-spacing:-.5px;text-align:center;line-height:1.2;
}
.stock-info{flex:1;min-width:0;}
.stock-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stock-meta{font-size:11px;color:var(--txt3);margin-top:3px;font-family:var(--mono);}
.stock-pnl{text-align:right;flex-shrink:0;}
.pnl-num{font-family:var(--mono);font-size:20px;font-weight:500;}
.pnl-pct{font-size:11px;font-weight:700;font-family:var(--mono);margin-top:2px;}
.chevron{color:var(--txt3);font-size:12px;margin-left:8px;transition:transform .2s;}
.stock-card.open .chevron{transform:rotate(180deg);}

.stock-body{display:none;border-top:1px solid var(--bdr);padding:20px;}
.stock-body.open{display:block;}

.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.info-box{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:12px;padding:12px 14px;
}
.info-label{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.info-val{font-family:var(--mono);font-size:15px;font-weight:500;}

.chart-wrap{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:12px;padding:14px;margin-bottom:14px;
}
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;}
.ctab{
  font-size:11px;font-weight:700;letter-spacing:.5px;
  border:1px solid var(--bdr2);border-radius:7px;
  padding:5px 12px;background:transparent;color:var(--txt3);
  transition:all .15s;
}
.ctab.on{background:var(--gold);color:#060709;border-color:var(--gold);}

.btn-remove{
  width:100%;padding:12px;
  background:transparent;color:var(--dn);
  border:1px solid var(--dn)20;border-radius:12px;
  font-size:13px;font-weight:700;letter-spacing:.5px;
  transition:background .15s;
}
.btn-remove:active{background:var(--dnBg);}

/* ── ADD FORM ── */
.add-panel{
  display:none;
  background:var(--s2);border:1px solid var(--gold)25;
  border-radius:18px;padding:20px;margin-bottom:16px;
}
.add-panel.show{display:block;animation:fadeIn .2s ease;}
.form-label{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:block;}
.inp{
  width:100%;background:var(--s1);
  border:1px solid var(--bdr2);border-radius:10px;
  padding:12px 14px;color:var(--txt);font-size:14px;outline:none;
  transition:border-color .15s;font-family:var(--sans);
}
.inp:focus{border-color:var(--gold)60;}
.inp::placeholder{color:var(--txt3);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── BUTTONS ── */
.btn-gold{
  background:var(--goldG);color:#060709;border:none;
  border-radius:12px;padding:12px 22px;
  font-size:14px;font-weight:900;letter-spacing:.5px;
  box-shadow:0 4px 24px #c8a84b30;
  transition:opacity .15s,transform .1s;
}
.btn-gold:active{opacity:.85;transform:scale(.98);}
.btn-ghost{
  background:var(--s1);color:var(--txt2);
  border:1px solid var(--bdr2);border-radius:12px;
  padding:12px 22px;font-size:14px;font-weight:700;
}

/* ── MARKET ── */
.mkt-chart-card{
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:16px;padding:18px;margin-bottom:12px;
}
.mkt-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.mkt-name{font-size:16px;font-weight:700;}
.mkt-price{font-family:var(--mono);font-size:14px;color:var(--txt2);margin-left:auto;}

/* ── AI ── */
.ai-card{background:var(--s2);border:1px solid var(--bdr);border-radius:18px;padding:20px;}
.ai-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--s3);border:1px solid var(--bdr2);
  border-radius:8px;padding:6px 12px;margin:4px;
  font-size:12px;
}
.ai-result{
  background:var(--s2);border:1px solid var(--gold)20;
  border-radius:18px;padding:22px;margin-top:16px;
  position:relative;overflow:hidden;
}
.ai-result::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold)50,transparent);
}
.ai-label{
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;
}
.ai-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 10px var(--gold);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.ai-text{font-size:14px;line-height:1.9;color:var(--txt);white-space:pre-wrap;}
.ai-disclaimer{font-size:10px;color:var(--txt3);margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr);letter-spacing:.3px;}

/* ── AI SUBTABS ── */
.ai-subtabs{
  display:flex;gap:6px;margin-bottom:16px;
  overflow-x:auto;padding-bottom:2px;
}
.ai-subtabs::-webkit-scrollbar{display:none;}
.ai-stab{
  flex-shrink:0;
  font-size:12px;font-weight:700;letter-spacing:.5px;
  border:1px solid var(--bdr2);border-radius:10px;
  padding:8px 16px;background:var(--s2);color:var(--txt3);
  transition:all .15s;white-space:nowrap;
}
.ai-stab.on{background:var(--goldG);color:#060709;border-color:transparent;}
.ai-sub{display:none;}
.ai-sub.active{display:block;animation:fadeIn .2s ease;}

/* Sim input row */
.sim-row{
  display:flex;align-items:center;gap:10px;
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
}
.sim-ticker{font-weight:700;color:var(--gold);font-size:13px;min-width:50px;}
.sim-inp{
  width:90px;background:var(--s2);border:1px solid var(--bdr2);
  border-radius:8px;padding:6px 10px;color:var(--txt);
  font-size:13px;font-family:var(--mono);outline:none;text-align:right;
}
.sim-inp:focus{border-color:var(--gold)60;}
.sim-result{margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:500;}



/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:99;
  background:rgba(6,7,9,0.92);
  border-top:1px solid var(--bdr);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;padding-bottom:env(safe-area-inset-bottom);
}
.nbtn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;
  padding:10px 4px;background:none;border:none;
  color:var(--txt3);font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  transition:color .15s;position:relative;
}
.nbtn .ic{font-size:22px;line-height:1;transition:transform .15s;}
.nbtn.on{color:var(--gold);}
.nbtn.on .ic{transform:scale(1.1);}
.nbtn.on::after{
  content:'';position:absolute;top:0;left:25%;right:25%;height:2px;
  background:var(--goldG);border-radius:0 0 4px 4px;
}

/* ── PIE CHART ── */
.pie-wrap{
  padding:20px;display:flex;align-items:center;
  gap:20px;flex-wrap:wrap;margin-bottom:4px;
}
.pie-legend{display:flex;flex-direction:column;gap:8px;flex:1;min-width:120px;}
.pie-item{display:flex;align-items:center;gap:8px;font-size:13px;}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pie-name{font-weight:700;flex:1;}
.pie-pct{font-family:var(--mono);font-size:12px;color:var(--txt3);}

/* ── SORT ── */
.sort-th{cursor:pointer;user-select:none;transition:color .15s;}
.sort-th:hover{color:var(--gold);}

/* ── NUMBER ANIMATION ── */
@keyframes countUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.stat-num.animating{animation:countUp .4s ease forwards;}

/* ── UTILS ── */
.up-col{color:var(--up);}
.dn-col{color:var(--dn);}
.gold-col{color:var(--gold);}
.mono{font-family:var(--mono);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
.flex-center{display:flex;align-items:center;}
.muted{color:var(--txt3);}
canvas{display:block;width:100%;}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="logo-wrap">
    <div class="logo">觀</div>
    <div class="logo-text">
      <div class="logo-name">觀盤</div>
      <div class="logo-sub">靜觀其變 · 洞察先機</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="time-badge" id="clock">——:——</div>
  </div>
</header>

<!-- PAGES -->
<div class="page">

  <!-- ① DASHBOARD -->
  <div class="tab-page active" id="pg-dashboard">
    <div class="stat-grid" id="stat-grid">
      <div class="stat"><div class="stat-label">總市值</div><div class="stat-num" id="s-val">—</div></div>
      <div class="stat"><div class="stat-label">投入成本</div><div class="stat-num muted" id="s-cost">—</div></div>
      <div class="stat"><div class="stat-label">未實現損益</div><div class="stat-num" id="s-pnl">—</div></div>
      <div class="stat"><div class="stat-label">整體報酬率</div><div class="stat-num" id="s-pct">—</div></div>
    </div>

    <div class="sec-label">大盤指數</div>
    <div class="idx-scroll" id="idx-row"></div>

    <!-- 資產圓餅圖 -->
    <div class="sec-label">資產配置</div>
    <div class="pie-wrap card">
      <canvas id="pie-canvas" style="height:180px;max-width:180px;margin:0 auto;display:block;"></canvas>
      <div id="pie-legend" class="pie-legend"></div>
    </div>

    <div class="sec-label" style="margin-top:20px;">持股明細</div>
    <div class="tbl-wrap">
      <div class="tbl-scroll">
        <table>
          <thead><tr>
            <th>股票</th>
            <th>現價</th>
            <th>持股</th>
            <th class="sort-th" onclick="setSort('pnl')">損益 <span id="sort-pnl">↕</span></th>
            <th class="sort-th" onclick="setSort('pnlPct')">報酬 <span id="sort-pnlPct">↕</span></th>
          </tr></thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ② PORTFOLIO -->
  <div class="tab-page" id="pg-portfolio">
    <div style="display:flex;align-items:center;margin-bottom:20px;">
      <div>
        <div style="font-size:20px;font-weight:900;letter-spacing:.5px;">庫存管理</div>
        <div style="font-size:11px;color:var(--txt3);margin-top:2px;" id="port-count"></div>
      </div>
      <button class="btn-gold" style="margin-left:auto;padding:10px 18px;font-size:13px;" onclick="toggleAdd()">＋ 新增持股</button>
    </div>

    <div class="add-panel" id="add-panel">
      <div style="font-size:13px;font-weight:900;color:var(--gold);letter-spacing:1px;margin-bottom:16px;">新增持股</div>
      <label class="form-label">股票代號</label>
      <input class="inp" id="f-ticker" placeholder="如 8932、3105" style="margin-bottom:12px;"/>
      <div class="form-row" style="margin-bottom:12px;">
        <div>
          <label class="form-label">持有股數</label>
          <input class="inp" id="f-shares" type="number" placeholder="1000"/>
        </div>
        <div>
          <label class="form-label">平均成本</label>
          <input class="inp" id="f-cost" type="number" placeholder="75.5"/>
        </div>
      </div>
      <div class="g2">
        <button class="btn-gold" style="width:100%;" onclick="addStock()">確認新增</button>
        <button class="btn-ghost" style="width:100%;" onclick="toggleAdd()">取消</button>
      </div>
    </div>

    <div id="stock-cards"></div>
  </div>

  <!-- ③ MARKET -->
  <div class="tab-page" id="pg-market">
    <div style="font-size:20px;font-weight:900;margin-bottom:20px;">大盤 &amp; 指數</div>
    <div class="idx-scroll" id="idx-row2"></div>
    <div id="mkt-charts"></div>
  </div>

  <!-- ④ AI -->
  <div class="tab-page" id="pg-ai">
    <div style="font-size:20px;font-weight:900;margin-bottom:4px;">AI 投資分析</div>
    <div style="font-size:12px;color:var(--txt3);margin-bottom:16px;letter-spacing:.3px;">Claude AI · 四大分析模式</div>

    <!-- AI Sub-tabs -->
    <div class="ai-subtabs" id="ai-subtabs">
      <button class="ai-stab on" onclick="goAITab('stock',this)">個股分析</button>

      <button class="ai-stab" onclick="goAITab('brief',this)">盤前摘要</button>

<script>

// ── Data ──────────────────────────────────────────────────────────────────────

  {id:1,ticker:"8932",shares:1150000,avgCost:98, name:"智通"},
  {id:2,ticker:"3105",shares:115000, avgCost:376.5,name:"穩懋"},

// ── Format ────────────────────────────────────────────────────────────────────
const f2  = n=>n==null?"—":n.toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2});
const fP  = n=>n==null?"—":(n>=0?"+":"")+n.toFixed(2)+"%";
const fW  = n=>n==null?"—":n>=100000000?`${(n/100000000).toFixed(2)}億`:`${(n/10000).toFixed(1)}萬`;
const sign= n=>n==null?"":n>=0?"up-col":"dn-col";
const badge=n=>{
  if(n==null) return `<span class="muted mono">—</span>`;
  const cls=n>=0?"badge-up":"badge-dn";
  const arrow=n>=0?"▲":"▼";
  return `<span class="${cls}">${arrow} ${fP(n)}</span>`;
};

// ── Canvas ────────────────────────────────────────────────────────────────────
function drawMini(cvs,data,col){
  if(!cvs||!data?.length)return;
  const dpr=devicePixelRatio||1,W=cvs.offsetWidth||120,H=40;
  cvs.width=W*dpr;cvs.height=H*dpr;
  const ctx=cvs.getContext("2d");ctx.scale(dpr,dpr);
  const v=data.map(d=>d.close).filter(Boolean);
  if(!v.length)return;
  const lo=Math.min(...v),hi=Math.max(...v),rng=hi-lo||1;
  const pts=v.map((n,i)=>[(i/(v.length-1||1))*(W-4)+2, H-4-((n-lo)/rng)*(H-10)]);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,col+"45");g.addColorStop(1,col+"00");
  ctx.beginPath();ctx.moveTo(pts[0][0],H);pts.forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.lineTo(pts.at(-1)[0],H);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));
  ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.lineJoin="round";ctx.stroke();
}

function drawFull(cvs,data,col,mode="price"){
  if(!cvs||!data?.length)return;
  const dpr=devicePixelRatio||1,W=cvs.offsetWidth||300,H=160;
  cvs.width=W*dpr;cvs.height=H*dpr;cvs.style.height=H+"px";
  const ctx=cvs.getContext("2d");ctx.scale(dpr,dpr);
  const pad={t:10,b:22,l:8,r:8};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;

  if(mode==="vol"){
    const vols=data.map(d=>d.volume||0);
    const maxV=Math.max(...vols)||1;
    const bw=Math.max(1,cw/data.length-1.5);
    data.forEach((d,i)=>{
      const x=pad.l+i*(cw/data.length)+1;
      const bh=(d.volume/maxV)*ch;
      const y=pad.t+ch-bh;
      ctx.fillStyle=col+"60";
      ctx.fillRect(x,y,bw,bh);
    });
  } else {
    const closes=data.map(d=>d.close).filter(Boolean);
    const ma5s=data.map(d=>d.ma5).filter(Boolean);
    if(!closes.length)return;
    const all=[...closes,...ma5s];
    const lo=Math.min(...all)*0.997,hi=Math.max(...all)*1.003,rng=hi-lo||1;
    const tx=i=>pad.l+(i/(data.length-1||1))*cw;
    const ty=v=>pad.t+ch-((v-lo)/rng)*ch;
    // Grid
    [0,.33,.66,1].forEach(r=>{
      const y=pad.t+r*ch;
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);
      ctx.strokeStyle="#1c213025";ctx.lineWidth=1;ctx.stroke();
    });
    // Fill
    const g=ctx.createLinearGradient(0,pad.t,0,H);
    g.addColorStop(0,col+"30");g.addColorStop(1,col+"00");
    ctx.beginPath();let f=true;
    data.forEach((d,i)=>{if(!d.close)return;f?(ctx.moveTo(tx(i),ty(d.close)),f=false):ctx.lineTo(tx(i),ty(d.close));});
    ctx.lineTo(tx(data.length-1),H);ctx.lineTo(tx(0),H);
    ctx.closePath();ctx.fillStyle=g;ctx.fill();
    // Close line
    ctx.beginPath();f=true;
    data.forEach((d,i)=>{if(!d.close)return;f?(ctx.moveTo(tx(i),ty(d.close)),f=false):ctx.lineTo(tx(i),ty(d.close));});
    ctx.strokeStyle=col;ctx.lineWidth=2.2;ctx.lineJoin="round";ctx.stroke();
    // MA5
    ctx.beginPath();f=true;ctx.setLineDash([5,4]);
    data.forEach((d,i)=>{if(!d.ma5)return;f?(ctx.moveTo(tx(i),ty(d.ma5)),f=false):ctx.lineTo(tx(i),ty(d.ma5));});
    ctx.strokeStyle="#c8a84b";ctx.lineWidth=1.4;ctx.stroke();ctx.setLineDash([]);
    // X labels
    ctx.fillStyle="#3a4470";ctx.font=`${9}px 'DM Mono',monospace`;ctx.textAlign="center";
    const step=Math.max(1,Math.floor(data.length/5));
    data.forEach((d,i)=>{if(i%step===0||i===data.length-1)ctx.fillText(d.date,tx(i),H-4);});
  }
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
const CORS="https://corsproxy.io/?";
const YF="https://query1.finance.yahoo.com/v8/finance/chart/";

async function fetchStock(ticker){
  for(const sfx of [".TWO",".TW"]){
    try{
      const url=`${CORS}${encodeURIComponent(`${YF}${ticker}${sfx}?interval=1d&range=3mo`)}`;
      const j=await fetch(url).then(r=>r.json());
      const res=j.chart?.result?.[0];if(!res)continue;
      const {meta,timestamp,indicators:{quote:[q]}}=res;
      const hist=timestamp.map((t,i)=>({
        date:new Date(t*1000).toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit"}),
        close:q.close[i]?+q.close[i].toFixed(2):null,
        volume:q.volume[i]||0,
      })).filter(d=>d.close);
      const withMA=hist.map((d,i)=>{
        const s=i>=4?hist.slice(i-4,i+1).map(x=>x.close).reduce((a,b)=>a+b)/5:null;
        return{...d,ma5:s?+s.toFixed(2):null};
      });
      return{price:meta.regularMarketPrice,high52:meta.fiftyTwoWeekHigh,low52:meta.fiftyTwoWeekLow,name:meta.longName||meta.shortName||ticker,history:withMA};
    }catch{continue;}
  }
  return null;
}

async function fetchIdx(ticker){
  try{
    const url=`${CORS}${encodeURIComponent(`${YF}${ticker}?interval=1d&range=1mo`)}`;
    const j=await fetch(url).then(r=>r.json());
    const res=j.chart.result[0],{meta}=res;
    const closes=res.indicators.quote[0].close;
    const hist=res.timestamp.map((t,i)=>({
      date:new Date(t*1000).toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit"}),
      close:closes[i]?+closes[i].toFixed(2):null,
    })).filter(d=>d.close);
    const price=meta.regularMarketPrice,prev=meta.chartPreviousClose;
    return{price,change:price-prev,changePct:(price-prev)/prev*100,history:hist};
  }catch{return null;}
}

// ── Pie Chart ─────────────────────────────────────────────────────────────────
const PIE_COLORS=["#c8a84b","#2ecc8f","#4a90d9","#e5566d","#a78bfa","#f5a623"];

function drawPie(data){
  const cvs=document.getElementById("pie-canvas");
  if(!cvs) return;
  const dpr=devicePixelRatio||1;
  const SIZE=180;
  cvs.width=SIZE*dpr; cvs.height=SIZE*dpr;
  cvs.style.width=SIZE+"px"; cvs.style.height=SIZE+"px";
  const ctx=cvs.getContext("2d");
  ctx.scale(dpr,dpr);
  const cx=SIZE/2, cy=SIZE/2, R=SIZE/2-10, IR=R*0.55;
  const total=data.reduce((a,d)=>a+d.value,0);
  if(!total) return;
  let angle=-Math.PI/2;
  data.forEach((d,i)=>{
    const slice=(d.value/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle=PIE_COLORS[i%PIE_COLORS.length];
    ctx.fill();
    // gap
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+slice);
    ctx.closePath();
    ctx.strokeStyle=PIE_COLORS[i%PIE_COLORS.length];
    ctx.lineWidth=2;
    angle+=slice;
  });
  // Donut hole
  ctx.beginPath();
  ctx.arc(cx,cy,IR,0,Math.PI*2);
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--s2').trim()||"#10131a";
  ctx.fill();
  // Center text
  ctx.fillStyle="#e8edf8";
  ctx.font=`bold ${11*dpr/dpr}px sans-serif`;
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("資產配置",cx,cy);

  // Legend
  const legend=document.getElementById("pie-legend");
  if(legend){
    legend.innerHTML=data.map((d,i)=>`
      <div class="pie-item">
        <div class="pie-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]};"></div>
        <div class="pie-name">${d.name}</div>
        <div class="pie-pct">${(d.value/total*100).toFixed(1)}%</div>
      </div>`).join("");
  }
}

// ── Sort ──────────────────────────────────────────────────────────────────────
let sortKey=null, sortDir=1;
function setSort(key){
  if(sortKey===key) sortDir*=-1;
  else{ sortKey=key; sortDir=-1; }
  // Update icons
  ["pnl","pnlPct"].forEach(k=>{
    const el=document.getElementById("sort-"+k);
    if(el) el.textContent=k===sortKey?(sortDir>0?"↑":"↓"):"↕";
  });
  renderDashboard();
}

// ── Number Animation ──────────────────────────────────────────────────────────
function animateNum(el, targetText){
  el.classList.remove("animating");
  void el.offsetWidth; // reflow
  el.innerHTML=targetText;
  el.classList.add("animating");
}


function enrich(){
  return portfolio.map(s=>{
    const d=live[s.ticker]||{};
    const cost=s.shares*s.avgCost;
    const value=d.price?s.shares*d.price:null;
    const pnl=value!=null?value-cost:null;
    const pnlPct=pnl!=null?pnl/cost*100:null;
    return{...s,...d,cost,value,pnl,pnlPct};
  });
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const e=enrich();
  const tc=e.reduce((a,s)=>a+s.cost,0);
  const tv=e.reduce((a,s)=>a+(s.value||s.cost),0);
  const tp=tv-tc, tpct=tp/tc*100;
  const up=tp>=0;

  animateNum(document.getElementById("s-val"),`<span>${fW(tv)}</span>`);
  animateNum(document.getElementById("s-cost"),`<span style="color:var(--txt2)">${fW(tc)}</span>`);

  const pnlEl=document.getElementById("s-pnl");
  animateNum(pnlEl,`<span class="${up?"up-col":"dn-col"}">${tp>=0?"+":""}${f2(tp)}</span>`);
  pnlEl.closest(".stat").className="stat "+(up?"up-card":"dn-card");

  const pctEl=document.getElementById("s-pct");
  animateNum(pctEl,`<span class="${up?"up-col":"dn-col"}">${fP(tpct)}</span>`);
  pctEl.closest(".stat").className="stat "+(up?"up-card":"dn-card");

  // Pie chart
  const pieData=e.map(s=>({name:s.name||s.ticker, value:s.value||s.cost}));
  requestAnimationFrame(()=>drawPie(pieData));

  // Index row
  const row=document.getElementById("idx-row");
  row.innerHTML="";
  IDXS.forEach((idx,i)=>{
    const d=idxData[idx.ticker];
    const up=d?d.changePct>=0:null;
    const col=up==null?"#4a5470":up?"#2ecc8f":"#e5566d";
    const div=document.createElement("div");
    div.className="idx-card"+(up==null?"":" "+(up?"up":"dn"));
    div.innerHTML=`
      <div class="idx-name">${idx.label}</div>
      <div class="idx-price mono">${d?d.price.toLocaleString("zh-TW",{maximumFractionDigits:0}):"—"}</div>
      <div class="idx-chg" style="color:${col}">${d?(up?"▲":"▼")+" "+Math.abs(d.changePct).toFixed(2)+"%":"載入中..."}</div>
      <canvas id="mini-${i}" class="idx-chart"></canvas>`;
    row.appendChild(div);
    if(d?.history) requestAnimationFrame(()=>drawMini(document.getElementById("mini-"+i),d.history,col));
  });

  // Table with sort
  let rows=[...e];
  if(sortKey) rows.sort((a,b)=>{
    const av=a[sortKey]??-Infinity, bv=b[sortKey]??-Infinity;
    return (av-bv)*sortDir;
  });
  document.getElementById("tbl-body").innerHTML=rows.map(s=>`
    <tr onclick="jumpTo('${s.ticker}')">
      <td><div class="td-ticker gold-col">${s.ticker}</div><div class="td-name">${(s.name||"").slice(0,8)}</div></td>
      <td class="td-mono">${s.price?f2(s.price):`<span class="muted">—</span>`}</td>
      <td class="td-mono muted">${(s.shares/1000).toFixed(0)}張</td>
      <td class="td-mono ${sign(s.pnl)}">${s.pnl!=null?(s.pnl>=0?"+":"")+fW(s.pnl):"—"}</td>
      <td>${badge(s.pnlPct)}</td>
    </tr>`).join("");
}

// ── Portfolio ─────────────────────────────────────────────────────────────────
function toggleAdd(){document.getElementById("add-panel").classList.toggle("show");}

function addStock(){
  const t=document.getElementById("f-ticker").value.trim().toUpperCase();
  const sh=+document.getElementById("f-shares").value;
  const ac=+document.getElementById("f-cost").value;
  if(!t||!sh||!ac)return;
  portfolio.push({id:Date.now(),ticker:t,shares:sh,avgCost:ac,name:t});
  save();
  ["f-ticker","f-shares","f-cost"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("add-panel").classList.remove("show");
  fetchStock(t).then(d=>{if(d){live[t]=d;const p=portfolio.find(x=>x.ticker===t);if(p&&p.name===p.ticker)p.name=d.name||t;renderPortfolio();renderDashboard();}});
  renderPortfolio();
}

function removeStock(id){
  portfolio=portfolio.filter(s=>s.id!==id);
  save();if(expanded===id)expanded=null;
  renderPortfolio();renderDashboard();
}

function toggleExpand(ticker){
  expanded=expanded===ticker?null:ticker;
  renderPortfolio();
}

function setChartMode(ticker,mode){
  chartMode[ticker]=mode;
  // re-draw only chart
  const s=enrich().find(x=>x.ticker===ticker);
  if(!s?.history)return;
  const cvs=document.getElementById("cvs-"+ticker);
  const up=(s.pnl||0)>=0;
  drawFull(cvs,s.history,up?"#2ecc8f":"#e5566d",mode);
  // update tab styles
  document.querySelectorAll(".ctab-"+ticker).forEach(el=>{
    el.classList.toggle("on",el.dataset.mode===mode);
  });
}

function renderPortfolio(){
  const e=enrich();
  document.getElementById("port-count").textContent=`共 ${e.length} 檔持股`;
  const container=document.getElementById("stock-cards");
  container.innerHTML="";
  e.forEach(s=>{
    const isOpen=expanded===s.ticker;
    const up=(s.pnl||0)>=0;
    const col=up?"#2ecc8f":"#e5566d";
    const mode=chartMode[s.ticker]||"price";
    const card=document.createElement("div");
    card.className="stock-card"+(isOpen?" open":"");
    card.innerHTML=`
      <div class="stock-hdr" onclick="toggleExpand('${s.ticker}')">
        <div class="ticker-badge">${s.ticker}</div>
        <div class="stock-info">
          <div class="stock-name">${s.name||s.ticker}</div>
          <div class="stock-meta">${s.shares.toLocaleString()} 股 &nbsp;·&nbsp; 均價 ${f2(s.avgCost)}</div>
        </div>
        <div class="stock-pnl">
          <div class="pnl-num ${up?"up-col":"dn-col"}">${s.pnl!=null?(s.pnl>=0?"+":"")+f2(s.pnl):"—"}</div>
          <div class="pnl-pct ${up?"up-col":"dn-col"}">${fP(s.pnlPct)}</div>
        </div>
        <div class="chevron">▼</div>
      </div>
      <div class="stock-body${isOpen?" open":""}">
        <div class="info-row">
          <div class="info-box">
            <div class="info-label">現價</div>
            <div class="info-val">${s.price?f2(s.price):"—"}</div>
          </div>
          <div class="info-box">
            <div class="info-label">52W 高</div>
            <div class="info-val up-col">${s.high52?f2(s.high52):"—"}</div>
          </div>
          <div class="info-box">
            <div class="info-label">52W 低</div>
            <div class="info-val dn-col">${s.low52?f2(s.low52):"—"}</div>
          </div>
        </div>
        <div class="chart-wrap">
          <div class="chart-tabs">
            <button class="ctab ctab-${s.ticker} ${mode==="price"?"on":""}" data-mode="price" onclick="setChartMode('${s.ticker}','price')">價格</button>
            <button class="ctab ctab-${s.ticker} ${mode==="vol"?"on":""}" data-mode="vol" onclick="setChartMode('${s.ticker}','vol')">成交量</button>
          </div>
          <canvas id="cvs-${s.ticker}" style="height:160px;border-radius:8px;"></canvas>
        </div>
        <button class="btn-remove" onclick="removeStock(${s.id})">移除持股</button>
      </div>`;
    container.appendChild(card);
    if(isOpen&&s.history){
      requestAnimationFrame(()=>drawFull(document.getElementById("cvs-"+s.ticker),s.history,col,mode));
    }
  });
}

// ── Market ────────────────────────────────────────────────────────────────────
function renderMarket(){
  // Mini idx cards
  const row2=document.getElementById("idx-row2");
  row2.innerHTML="";
  IDXS.forEach((idx,i)=>{
    const d=idxData[idx.ticker];
    const up=d?d.changePct>=0:null;
    const col=up==null?"#4a5470":up?"#2ecc8f":"#e5566d";
    const div=document.createElement("div");
    div.className="idx-card"+(up==null?"":" "+(up?"up":"dn"));
    div.innerHTML=`
      <div class="idx-name">${idx.label}</div>
      <div class="idx-price mono">${d?d.price.toLocaleString("zh-TW",{maximumFractionDigits:0}):"—"}</div>
      <div class="idx-chg" style="color:${col}">${d?(up?"▲":"▼")+" "+Math.abs(d.changePct).toFixed(2)+"%":"—"}</div>
      <canvas id="mini2-${i}" class="idx-chart"></canvas>`;
    row2.appendChild(div);
    if(d?.history) requestAnimationFrame(()=>drawMini(document.getElementById("mini2-"+i),d.history,col));
  });

  // Full charts
  const mkt=document.getElementById("mkt-charts");
  mkt.innerHTML="";
  IDXS.forEach((idx,i)=>{
    const d=idxData[idx.ticker];
    const up=d?d.changePct>=0:null;
    const col=up==null?"#4a5470":up?"#2ecc8f":"#e5566d";
    const box=document.createElement("div");
    box.className="mkt-chart-card";
    box.innerHTML=`
      <div class="mkt-hdr">
        <div class="mkt-name">${idx.label}</div>
        <div class="${up==null?"muted":up?"up-col":"dn-col"}" style="font-family:var(--mono);font-size:13px;font-weight:700;">
          ${d?(up?"▲":"▼")+" "+Math.abs(d.changePct).toFixed(2)+"%":"—"}
        </div>
        <div class="mkt-price">${d?d.price.toLocaleString("zh-TW",{maximumFractionDigits:2}):""}</div>
      </div>
      <canvas id="mkt-${i}" style="height:160px;border-radius:8px;"></canvas>`;
    mkt.appendChild(box);
    if(d?.history) requestAnimationFrame(()=>drawFull(document.getElementById("mkt-"+i),d.history,col));
  });
}

// ── AI ────────────────────────────────────────────────────────────────────────
let selectedStockTicker = null;

function goAITab(id, btn){
  document.querySelectorAll(".ai-sub").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".ai-stab").forEach(el=>el.classList.remove("on"));
  document.getElementById("aisub-"+id).classList.add("active");
  btn.classList.add("on");
}

function renderAIPage(){
  const e=enrich();
  if(!selectedStockTicker && e.length) selectedStockTicker=e[0].ticker;

  // 個股分析 chips
  document.getElementById("stock-select-chips").innerHTML=e.map(s=>`
    <span class="ai-chip" style="cursor:pointer;border-color:${selectedStockTicker===s.ticker?"var(--gold)":"var(--bdr2)"};" onclick="selectStockAI('${s.ticker}')">
      <span style="color:${selectedStockTicker===s.ticker?"var(--gold)":"var(--txt2)"};font-weight:700;">${s.ticker}</span>
      <span class="muted" style="margin-left:6px;">${s.name||""}</span>
    </span>`).join("");

  // 組合健診 chips
  document.getElementById("health-chips").innerHTML=e.map(s=>`
    <span class="ai-chip">
      <span class="gold-col" style="font-weight:700;">${s.ticker}</span>
      <span class="muted" style="margin-left:6px;">${(s.shares/1000).toFixed(0)}張</span>
      ${s.pnlPct!=null?`<span class="${s.pnlPct>=0?"up-col":"dn-col"}" style="font-family:var(--mono);font-size:11px;margin-left:6px;">${fP(s.pnlPct)}</span>`:""}
    </span>`).join("");

  // 盤前摘要 chips
  document.getElementById("brief-chips").innerHTML=`
    <span class="ai-chip"><span class="gold-col" style="font-weight:700;">台股大盤</span></span>
    ${e.map(s=>`<span class="ai-chip"><span class="gold-col" style="font-weight:700;">${s.ticker}</span><span class="muted" style="margin-left:6px;">${s.name||""}</span></span>`).join("")}`;

  // 情境模擬 rows
  document.getElementById("sim-rows").innerHTML=e.map(s=>`
    <div class="sim-row">
      <div class="sim-ticker">${s.ticker}</div>
      <div style="font-size:12px;color:var(--txt3);flex:1;">${s.name||""}</div>
      <input class="sim-inp" id="sim-${s.ticker}" type="number" placeholder="漲跌%" value="0" oninput="calcSim()"/>
      <div class="sim-result" id="simr-${s.ticker}" style="color:var(--txt3);">—</div>
    </div>`).join("");
}

function selectStockAI(ticker){
  selectedStockTicker=ticker;
  renderAIPage();
}

function calcSim(){
  const e=enrich();
  let totalDelta=0;
  e.forEach(s=>{
    const pct=parseFloat(document.getElementById("sim-"+s.ticker)?.value)||0;
    const base=s.value||(s.shares*s.avgCost);
    const delta=base*(pct/100);
    totalDelta+=delta;
    const el=document.getElementById("simr-"+s.ticker);
    if(el){
      el.textContent=(delta>=0?"+":"")+f2(delta);
      el.className="sim-result "+(delta>=0?"up-col":"dn-col");
    }
  });
  // Show total in button area
  const btn=document.getElementById("btn-sim-ai");
  if(btn) btn.textContent=`▶ 模擬計算　總計 ${totalDelta>=0?"+":""}${fW(totalDelta)}`;
}

async function callClaude(prompt, btnId, outputId){
  const btn=document.getElementById(btnId);
  const origText=btn.textContent;
  btn.textContent="分析中...";btn.disabled=true;btn.style.opacity=".6";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]}),
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||"無法取得分析結果";
    document.getElementById(outputId).innerHTML=`
      <div class="ai-result" style="margin-top:14px;">
        <div class="ai-label">
          <div class="ai-dot"></div>
          <span class="gold-col" style="font-size:11px;font-weight:900;letter-spacing:2px;">CLAUDE AI · 分析完成</span>
        </div>
        <div class="ai-text">${text.replace(/\n/g,"<br/>")}</div>
        <div class="ai-disclaimer">以上內容為 AI 輔助分析，僅供參考，不構成投資建議。</div>
      </div>`;
  }catch{
    document.getElementById(outputId).innerHTML=`<div class="ai-result" style="margin-top:14px;"><div class="ai-text dn-col">分析失敗，請稍後再試。</div></div>`;
  }
  btn.textContent=origText;btn.disabled=false;btn.style.opacity="1";
}

// ① 個股深度分析
async function runStockAI(){
  const e=enrich();
  const s=e.find(x=>x.ticker===selectedStockTicker);
  if(!s) return;
  const hist=s.history||[];
  const recent=hist.slice(-10).map(d=>`${d.date} 收${d.close}`).join("、");
  const prompt=`你是台灣股市專業分析師，請用繁體中文對以下個股做深度分析（250字內）：

股票：${s.name}（${s.ticker}）
持有：${(s.shares/1000).toFixed(0)}張
現價：${s.price?.toFixed(2)||"N/A"} 元
52週高：${s.high52?.toFixed(2)||"N/A"} 元
52週低：${s.low52?.toFixed(2)||"N/A"} 元
近10日收盤：${recent}

請分析：
1. 技術面走勢（目前相對52W位置、趨勢判斷）
2. 近期量價觀察
3. 短線操作建議（偏多/偏空/觀望）`;
  await callClaude(prompt,"btn-stock-ai","out-stock");
}

// ② 組合健診
async function runHealthAI(){
  const e=enrich();
  const total=e.reduce((a,s)=>a+(s.value||s.cost),0);
  const prompt=`你是台灣股市專業分析師，請用繁體中文對以下投資組合做健診分析（250字內）：

總市值：${fW(total)}
持股明細：
${e.map(s=>{
  const w=((s.value||s.cost)/total*100).toFixed(1);
  return `- ${s.name}(${s.ticker})：市值${fW(s.value||s.cost)}，佔比${w}%，損益${s.pnl?.toFixed(0)||"N/A"}元(${s.pnlPct?.toFixed(1)||"N/A"}%)`;
}).join("\n")}

請分析：
1. 集中度風險評估
2. 產業暴露分析
3. 具體建議（是否需要分散、加減碼方向）`;
  await callClaude(prompt,"btn-health-ai","out-health");
}

// ③ 盤前摘要
async function runBriefAI(){
  const e=enrich();
  const tickers=e.map(s=>`${s.name}(${s.ticker})`).join("、");
  const twii=idxData["^TWII"];
  const mktInfo=twii?`台股加權指數昨收 ${twii.price?.toFixed(0)}，${twii.changePct>=0?"上漲":"下跌"} ${Math.abs(twii.changePct).toFixed(2)}%`:"台股大盤";
  const prompt=`你是台灣股市專業分析師，請用繁體中文產生今日盤前摘要（250字內）：

大盤：${mktInfo}
我的持股：${tickers}

請提供：
1. 今日大盤開盤展望（根據昨日走勢）
2. 我的持股今日需注意事項
3. 一句今日操作心法

今天日期：${new Date().toLocaleDateString("zh-TW")}`;
  await callClaude(prompt,"btn-brief-ai","out-brief");
}

// ④ 情境模擬
async function runSimAI(){
  const e=enrich();
  const total=e.reduce((a,s)=>a+(s.value||s.cost),0);
  let totalDelta=0;
  const scenarioDesc=e.map(s=>{
    const pct=parseFloat(document.getElementById("sim-"+s.ticker)?.value)||0;
    const base=s.value||(s.shares*s.avgCost);
    const delta=base*(pct/100);
    totalDelta+=delta;
    return `${s.name}(${s.ticker}) ${pct>=0?"+":""}${pct}% → ${delta>=0?"+":""}${f2(delta)}元`;
  }).join("\n");
  const prompt=`你是台灣股市專業分析師，請用繁體中文分析以下情境模擬結果（200字內）：

當前總市值：${fW(total)}
情境假設：
${scenarioDesc}
模擬後總損益變化：${totalDelta>=0?"+":""}${fW(totalDelta)}

請分析：
1. 這個情境發生的可能性與觸發條件
2. 如果情境成真，建議的應對策略
3. 風險控制建議`;
  await callClaude(prompt,"btn-sim-ai","out-sim");
}

async function init(){
  renderDashboard();
  // Fetch all indices
  await Promise.all(IDXS.map(async idx=>{
    const d=await fetchIdx(idx.ticker);
    if(d)idxData[idx.ticker]=d;
  }));
  renderDashboard();
  // Fetch all stocks
  await Promise.all(portfolio.map(async s=>{
    const d=await fetchStock(s.ticker);
    if(d){
      live[s.ticker]=d;
      const p=portfolio.find(x=>x.ticker===s.ticker);
      // 只有當名稱還是預設代號時才用 Yahoo 回傳的名稱，保留使用者設定的中文名
      if(p && p.name===p.ticker) p.name=d.name||p.ticker;
    }
  }));
  renderDashboard();
  renderPortfolio();
}
init();
